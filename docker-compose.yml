services:
  postgres:
    image: postgres:16-alpine
    container_name: lumio_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lumio
      POSTGRES_PASSWORD: lumio_dev_password
      POSTGRES_DB: lumio_booking
    ports:
      # Host port 5433 -> container 5432 to avoid clashing with a local Postgres on 5432
      - "5433:5432"
    volumes:
      - lumio_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: lumio_redis
    restart: unless-stopped
    ports:
      # Host port 6380 -> container 6379 to avoid clashing with a local Redis on 6379
      - "6380:6379"
    volumes:
      - lumio_redis_data:/data

volumes:
  lumio_postgres_data:
  lumio_redis_data:
