# ===========================================================================
# Render Blueprint for Lumio Booking (monorepo: NestJS API + Next.js web).
# One push to GitHub -> Render rebuilds & redeploys both services.
# Database is hosted on Neon (set DATABASE_URL below).
#
# Env vars marked "sync: false" must be filled in the Render dashboard
# (or when you first apply the blueprint). See DEPLOY.md for the walkthrough.
# ===========================================================================
services:
  # ---------------------- Backend API (NestJS, /api) ----------------------
  - type: web
    name: lumio-api
    runtime: node
    # Starter ($7/mo) so the API never sleeps (no cold start). Keep this in the
    # blueprint so a deploy never silently reverts it to free.
    plan: starter
    rootDir: .
    # install whole workspace -> generate Prisma client -> build -> run migrations
    buildCommand: >-
      npm install --include=dev &&
      npm run db:generate --workspace=apps/api &&
      npm run build --workspace=apps/api &&
      npm run db:migrate:deploy --workspace=apps/api
    startCommand: node apps/api/dist/src/main.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Neon connection string (postgresql://...?sslmode=require). Secret.
      - key: DATABASE_URL
        sync: false
      # Auto-generated strong secret for signing JWTs.
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: BCRYPT_SALT_ROUNDS
        value: "12"
      - key: EMAIL_PROVIDER
        value: mock
      # Brevo (HTTPS email API) — recommended for reliable sending from the cloud.
      # Sign up free at brevo.com, verify a sender, paste the API key here.
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        value: Lumio Booking
      # Platform Gmail (OAuth2 — same as WP Mail SMTP's Google mailer). Free, works
      # over HTTPS so it isn't blocked like SMTP. Fill all 4 to enable.
      - key: GMAIL_CLIENT_ID
        sync: false
      - key: GMAIL_CLIENT_SECRET
        sync: false
      - key: GMAIL_REFRESH_TOKEN
        sync: false
      - key: GMAIL_SENDER_EMAIL
        sync: false
      - key: GMAIL_SENDER_NAME
        value: Lumio Booking
      # SMS: leave SMS_PROVIDER unset/blank — Twilio auto-enables once the
      # TWILIO_* vars below are filled. Set to "mock" to force-disable real SMS.
      - key: SMS_PROVIDER
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      # Use ONE sender: a Messaging Service (recommended, handles STOP/HELP) ...
      - key: TWILIO_MESSAGING_SERVICE_SID
        sync: false
      # ... or a single toll-free/long-code number in E.164 (e.g. +18337195153).
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: PAYMENT_PROVIDER
        value: mock
      # ---- Self-serve SaaS billing (subscriptions) ----
      # Public base URL of the web app, used for checkout success/cancel links.
      - key: APP_URL
        value: https://lumiobooking.com
      # Web Push (VAPID): new-booking alerts on the owner's phone even when the
      # app is closed. Generate a keypair (npx web-push generate-vapid-keys) and
      # paste below in the Render dashboard. Leave blank to keep push disabled.
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:support@lumiobooking.com
      # Stripe: secret key (sk_live_…) + webhook signing secret (whsec_…).
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # PayPal: REST app credentials + webhook id. PAYPAL_ENV = live | sandbox.
      - key: PAYPAL_ENV
        value: live
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_SECRET
        sync: false
      - key: PAYPAL_WEBHOOK_ID
        sync: false
      # Comma-separated allowed frontend origins. Set to the web URL after the
      # first deploy, e.g. https://lumio-web.onrender.com
      - key: CORS_ORIGINS
        sync: false
      # ---- Keep-alive (anti cold-start on the free tier) ----
      # The API pings itself (RENDER_EXTERNAL_URL is injected automatically) and
      # the web app to keep both warm during business hours. Set KEEPALIVE_WEB_URL
      # to your web service URL. Tune the window/timezone to your salons' hours.
      # On a paid plan that never sleeps, set KEEPALIVE_ENABLED=false.
      - key: KEEPALIVE_ENABLED
        value: "true"
      - key: KEEPALIVE_WEB_URL
        value: https://lumio-web-1xqk.onrender.com
      # US/Canada: 10:00–21:00 US Eastern = 07:00–18:00 Pacific. ~11h window keeps
      # both services under Render's 750 free instance-hours/month budget.
      - key: KEEPALIVE_START_HOUR
        value: "10"
      - key: KEEPALIVE_END_HOUR
        value: "21"
      - key: KEEPALIVE_TZ
        value: America/New_York

  # ---------------------- Frontend (Next.js dashboard) --------------------
  - type: web
    name: lumio-web
    runtime: node
    # Paid (Starter, $7/mo) so a blueprint deploy never silently reverts it to
    # free (which would sleep + cold-start). Pinned here like the API service.
    plan: starter
    rootDir: .
    # Raise Node's heap ceiling for `next build` so it doesn't die with
    # "JavaScript heap out of memory" as the app grows (the build machine has
    # headroom even though the runtime instance is small).
    buildCommand: npm install --include=dev && NODE_OPTIONS=--max-old-space-size=4096 npm run build --workspace=apps/web
    startCommand: cd apps/web && npx next start -p $PORT
    envVars:
      - key: NODE_ENV
        value: production
      # Base URL of the API INCLUDING the /api suffix. Baked in at build time,
      # so set it before the first web build, e.g.
      #   https://lumio-api.onrender.com/api
      - key: NEXT_PUBLIC_API_URL
        sync: false
